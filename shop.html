
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grow A Garden 2 Guilds | Shop</title>
<meta name="description" content="Grow A Garden 2 Guilds Shop - Buy Roblox GAG2 items, seeds, pets, fruits, and resources to help your guild reach the top.">
    
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="https://gag.gg/favicon-32.png?v=6">
<link rel="stylesheet" href="bg.css">
<link rel="stylesheet" href="styles.css">
</head>
<body class="night">

<div class="sky">
    <div class="stars"></div>
    <div class="moon"></div>
    <div class="sun"></div>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
</div>

<div class="topbar">
    <a href="https://www.roblox.com/home" class="nav-btn login-small">Login</a>
    <a href="index.html" class="nav-btn vote-small">Home</a>
    <a href="more.html" class="nav-btn guild-small">Help</a>
</div>

<div class="wrapper">
    <div class="shopcard">
        <div class="logo">
            <div class="logo-top">
                G<span class="pot">🍎</span>G <span class="two">2</span>
            </div>
            <div class="logo-bottom">
                Guilds Shop
            </div>
        </div>

        <div class="divider"></div>

        <div id="shop" class="shop"></div>

</div>

<script>
let dayMode = false;

/* ========================= */
/* DAY / NIGHT TOGGLE */
/* ========================= */

function switchTheme() {
    if (dayMode) {
        document.body.classList.remove("day");
        document.body.classList.add("night");
    } else {
        document.body.classList.remove("night");
        document.body.classList.add("day");
    }

    dayMode = !dayMode;
}

/* Every 60 seconds */
setInterval(switchTheme, 60000);

/* ========================= */
/* SHOP SYSTEM */
/* ========================= */

const shopItems = [
    {
        title: "100m - 1b Fruits",
        price: "R$ 50",
        oldPrice: "",
        image: "https://www.lolga.com/uploads/images/goods/grow-a-garden-2/all-server-100000-sheckles.png",
        link: "https://www.roblox.com/game-pass/1898492803/"
    }
/*
    {
        title: "Item",
        price: "R$ 50",
        oldPrice: "",
        image: "image.png",
        link: "https://www.roblox.com/game-pass/0/"
    } 
*/
];


/* Render shop */
function renderShop(containerId, items) {
    const shop = document.getElementById(containerId);
    if (!shop) return;

    shop.innerHTML = items.map(item => `
        <div class="shop-item">
            <img src="${item.image}" alt="${item.title}">
            <div class="shop-content">
                <div class="shop-title">${item.title}</div>
                <div class="shop-price">
                    ${item.oldPrice ? `<span class="discount">${item.oldPrice}</span>` : ""}
                    ${item.price}
                </div>
                <a class="shop-btn"
                   href="${item.link}"
                   ${item.link.startsWith("#") ? "" : 'target="_blank"'}>
                    Buy Now
                </a>
            </div>
        </div>
    `).join("");
}

function addShopItem(shopArray, containerId, title, oldPrice, price, image, link) {
    shopArray.push({
        title,
        oldPrice,
        price,
        image,
        link
    });
    renderShop(containerId, shopArray);
}

/* INIT SHOP */
renderShop("shop", shopItems);

</script>

</body>
</html>
